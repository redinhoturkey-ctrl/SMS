name: Keep Alive

on:
  schedule:
    - cron: '0 * * * *'  # toutes les heures pile
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Ping
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "$(date -u)" > .keep-alive
          git add .keep-alive
          git commit -m "chore: keep alive $(date -u +%Y-%m-%d %H:%M)"
          git push

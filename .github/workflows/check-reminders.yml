name: Check Reminders & Send SMS

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:
  push:
    paths:
      - 'reminders.json'

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main          # toujours prendre la dernière version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Afficher reminders.json (debug)
        run: cat reminders.json

      - name: Check reminders and send SMS
        env:
          SMS_USER: ${{ secrets.SMS_USER }}
          SMS_PASS: ${{ secrets.SMS_PASS }}
        run: node send-sms.js

      - name: Commit updated reminders.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reminders.json
          # Ne commit que si le fichier a changé
          if git diff --staged --quiet; then
            echo "Aucun changement, pas de commit."
          else
            git commit -m "chore: mark reminders as sent"
            # Pull --rebase pour éviter les conflits si un autre job a pushé entre temps
            git pull --rebase origin main
            git push
          fi

name: Check Reminders & Send SMS

on:
  schedule:
    - cron: '* * * * *'   # toutes les minutes
  workflow_dispatch:       # déclenchement manuel depuis l'onglet Actions
  push:
    paths:
      - 'reminders.json'  # se déclenche aussi quand un rappel est ajouté

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # supprime l'avertissement Node.js

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Afficher reminders.json (debug)
        run: cat reminders.json

      - name: Check reminders and send SMS
        env:
          SMS_USER: ${{ secrets.SMS_USER }}
          SMS_PASS: ${{ secrets.SMS_PASS }}
        run: node send-sms.js

      - name: Commit updated reminders.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reminders.json
          git diff --staged --quiet || git commit -m "chore: mark reminders as sent"
          git push
